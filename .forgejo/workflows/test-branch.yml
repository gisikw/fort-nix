name: Test Branch

on:
  push:
    branches:
      - '*-test'

jobs:
  test:
    runs-on: nixos
    steps:
      - uses: actions/checkout@v4

      - name: Extract hostname from branch
        id: extract
        run: |
          branch="${GITHUB_REF#refs/heads/}"
          hostname="${branch%-test}"
          echo "branch=$branch" >> "$GITHUB_OUTPUT"
          echo "hostname=$hostname" >> "$GITHUB_OUTPUT"
          echo "Host: $hostname (from branch: $branch)"

          # Validate hostname exists
          host_dir="./clusters/bedlam/hosts/${hostname}"
          if [ ! -d "$host_dir" ]; then
            echo "::error::No host found at $host_dir"
            exit 1
          fi

      - name: Run Go provider tests
        run: |
          for provider_dir in ./apps/*/provider ./aspects/*/provider; do
            if [ -d "$provider_dir" ] && [ -f "$provider_dir/go.mod" ]; then
              echo "::group::Testing $provider_dir"
              nix shell nixpkgs#go -c sh -c "cd $provider_dir && CGO_ENABLED=0 go test -v ./..."
              echo "::endgroup::"
            fi
          done

      - name: Check host flake
        run: |
          hostname="${{ steps.extract.outputs.hostname }}"
          host_dir="./clusters/bedlam/hosts/${hostname}"
          echo "::group::Checking host: $hostname"
          nix flake check "$host_dir" --no-build
          echo "::endgroup::"
        env:
          NIX_CONFIG: "warn-dirty = false"
