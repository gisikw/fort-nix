name: Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: nixos
    steps:
      - uses: actions/checkout@v4

      - name: Scan for PII
        run: |
          PII_DENYLIST='clusters/bedlam/pii-denylist.sops'

          if [ -f "$PII_DENYLIST" ]; then
            export SOPS_AGE_KEY="$CI_AGE_KEY"

            nix shell nixpkgs#sops -c sops -d --input-type binary --output-type binary "$PII_DENYLIST" > /tmp/pii-patterns.txt

            found=0
            while IFS= read -r pattern; do
              [ -z "$pattern" ] && continue
              [[ "$pattern" =~ ^# ]] && continue
              if grep -rliE "\b${pattern}\b" --include="*.nix" . 2>/dev/null; then
                echo "::error::PII pattern detected: $pattern"
                found=1
              fi
            done < /tmp/pii-patterns.txt
            rm -f /tmp/pii-patterns.txt

            if [ "$found" -eq 1 ]; then
              echo "::error::PII detected - blocking build"
              exit 1
            fi
            echo "PII scan passed"
          else
            echo "::warning::No PII denylist at $PII_DENYLIST"
          fi
        env:
          CI_AGE_KEY: ${{ secrets.CI_AGE_KEY }}

      - name: Run Go provider tests
        run: |
          for provider_dir in ./apps/*/provider ./aspects/*/provider; do
            if [ -d "$provider_dir" ] && [ -f "$provider_dir/go.mod" ]; then
              echo "::group::Testing $provider_dir"
              nix shell nixpkgs#go -c sh -c "cd $provider_dir && CGO_ENABLED=0 go test -v ./..."
              echo "::endgroup::"
            fi
          done

      - name: Check flakes
        run: |
          fail=0

          # Root flake
          nix flake check --no-build > /tmp/check-root.log 2>&1 &

          # Host flakes
          for host_dir in ./clusters/bedlam/hosts/*/; do
            host=$(basename "$host_dir")
            nix flake check "$host_dir" --no-build > "/tmp/check-host-${host}.log" 2>&1 &
          done

          # Device flakes
          for device_dir in ./clusters/bedlam/devices/*/; do
            device=$(basename "$device_dir")
            nix flake check "$device_dir" --no-build > "/tmp/check-device-${device}.log" 2>&1 &
          done

          for job in $(jobs -p); do
            if ! wait "$job"; then fail=1; fi
          done

          # Print results
          echo "::group::Root flake"
          cat /tmp/check-root.log
          echo "::endgroup::"
          for host_dir in ./clusters/bedlam/hosts/*/; do
            host=$(basename "$host_dir")
            echo "::group::Host: $host"
            cat "/tmp/check-host-${host}.log"
            echo "::endgroup::"
          done
          for device_dir in ./clusters/bedlam/devices/*/; do
            device=$(basename "$device_dir")
            echo "::group::Device: $device"
            cat "/tmp/check-device-${device}.log"
            echo "::endgroup::"
          done
          [ "$fail" -eq 0 ]
        env:
          NIX_CONFIG: "warn-dirty = false"

  mirror:
    needs: check
    if: github.event_name == 'push'
    runs-on: nixos
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to GitHub mirror
        run: |
          REPO_URL="https://${MIRROR_TOKEN}@github.com/gisikw/fort-nix.git"
          GIT_TERMINAL_PROMPT=0 git push --force "$REPO_URL" main:main
        env:
          MIRROR_TOKEN: ${{ secrets.MIRROR_TOKEN }}
